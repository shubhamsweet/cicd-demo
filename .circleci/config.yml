version: 2.1

jobs:
  deploy:
    docker:
      - image: cimg/base:stable

    steps:
      - checkout

      - run:
          name: Deploy to EC2
          command: |
            ssh -o StrictHostKeyChecking=no ubuntu@13.201.135.10 "
              cd /var/www/html &&
              git pull origin main &&
              sudo systemctl restart nginx
            "

workflows:
  version: 2
  deploy_pipeline:
    jobs:
      - deploy
